name: SDK PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'js/**'
  push:
    paths:
      - 'js/**'

jobs:
  js-sdk-checks:
    name: JavaScript SDK Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Install workspace dependencies
        run: |
          if ! bun install --frozen-lockfile; then
            echo "❌ Lockfile is out of sync"
            cp bun.lock bun.lock.original
            bun install
            echo "=== Lockfile diff ==="
            diff bun.lock.original bun.lock || true
            exit 1
          fi

      - name: Audit dependencies
        continue-on-error: true
        run: |
          bun audit 2>&1 | sed 's/\x1b\[[0-9;]*m//g' || true
          bun audit --audit-level=high

      - name: Run format check
        id: format-check
        working-directory: js
        run: |
          set +e
          # Store the current state
          git diff > /tmp/pre-format.diff

          # Run formatter
          bun run fmt

          # Check if there are any changes after formatting
          git diff > /tmp/post-format.diff

          # Compare diffs
          if ! cmp -s /tmp/pre-format.diff /tmp/post-format.diff; then
            echo "Code formatting issues found. Please run 'bun run fmt' locally and commit the changes."
            echo "format_issues=true" >> $GITHUB_OUTPUT
            echo "⚠️ **Formatting issues detected**" > format_report.txt
            echo "" >> format_report.txt
            echo "Please run \`bun run fmt\` in the \`js/\` directory locally and commit the changes to resolve formatting issues." >> format_report.txt
            exit_code=1
          else
            echo "No formatting issues found."
            echo "format_issues=false" >> $GITHUB_OUTPUT
            echo "✓ No formatting issues found" > format_report.txt
            exit_code=0
          fi
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
          exit $exit_code

      - name: Run TypeScript type check
        id: type-check
        working-directory: js
        run: |
          set +e
          bun run type-check > type_check_report.txt 2>&1
          exit_code=$?
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT

      - name: Run tests
        id: test
        working-directory: js
        run: |
          set +e
          bun run test > test_report.txt 2>&1
          exit_code=$?
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT

      - name: Run lint check (if available)
        id: lint-check
        working-directory: js
        run: |
          set +e
          # Check if lint script exists
          if bun run | grep -q "lint"; then
            bun run lint > lint_report.txt 2>&1
            exit_code=$?
            if [ $exit_code -ne 0 ]; then
              echo "Linting issues found. Please run 'bun run lint' locally and fix the issues."
              echo "lint_issues=true" >> $GITHUB_OUTPUT
              echo "⚠️ **Linting issues detected**" > lint_report.txt
              echo "" >> lint_report.txt
              echo "Please run \`bun run lint\` in the \`js/\` directory locally and fix the linting issues." >> lint_report.txt
            else
              echo "No linting issues found."
              echo "lint_issues=false" >> $GITHUB_OUTPUT
              echo "✓ No linting issues found" > lint_report.txt
            fi
            echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
          else
            echo "No lint script found, skipping linting."
            echo "lint_issues=false" >> $GITHUB_OUTPUT
            echo "exit_code=0" >> $GITHUB_OUTPUT
            echo "ℹ️ No lint script found, skipping linting" > lint_report.txt
          fi

      - name: Save PR metadata
        if: always() && github.event_name == 'pull_request'
        run: |
          mkdir -p pr-metadata
          echo "${{ github.event.pull_request.number }}" > pr-metadata/pr_number.txt
          echo "${{ github.event.pull_request.head.ref }}" > pr-metadata/pr_branch.txt
          echo "${{ github.event.pull_request.head.sha }}" > pr-metadata/pr_sha.txt

      - name: Upload check results
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: check-results
          path: |
            js/format_report.txt
            js/type_check_report.txt
            js/test_report.txt
            js/lint_report.txt
            pr-metadata/

  compatibility-checks:
    name: Compatibility Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Install workspace dependencies
        run: |
          if ! bun install --frozen-lockfile; then
            echo "❌ Lockfile is out of sync"
            cp bun.lock bun.lock.original
            bun install
            echo "=== Lockfile diff ==="
            diff bun.lock.original bun.lock || true
            exit 1
          fi

      - name: Audit dependencies
        continue-on-error: true
        run: |
          bun audit 2>&1 | sed 's/\x1b\[[0-9;]*m//g' || true
          bun audit --audit-level=high

      - name: Build for Node.js ${{ matrix.node-version }}
        working-directory: js
        run: bun run build

      - name: Test Node.js compatibility
        working-directory: js
        run: |
          # Test basic import/require functionality
          if [ -f "dist/index.js" ]; then
            node -e "
              console.log('Testing Node.js ${{ matrix.node-version }} compatibility...');
              try {
                const pkg = require('./dist/index.js');
                console.log('✓ CommonJS import successful');
              } catch (e) {
                console.error('✗ CommonJS import failed:', e.message);
                process.exit(1);
              }
            "
          else
            echo "Warning: dist/index.js not found, checking for other build outputs..."
            ls -la dist/ || echo "dist directory not found"
          fi
          
          if [ -f "dist/index.mjs" ] || [ -f "dist/index.esm.js" ]; then
            node --input-type=module -e "
              console.log('Testing ESM import...');
              import('./dist/index.mjs').then(() => {
                console.log('✓ ESM import successful');
              }).catch((e) => {
                console.error('✗ ESM import failed:', e.message);
                process.exit(1);
              });
            "
          else
            echo "Warning: ESM build outputs not found"
          fi

  browser-compatibility:
    name: Browser Compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Install workspace dependencies
        run: |
          if ! bun install --frozen-lockfile; then
            echo "❌ Lockfile is out of sync"
            cp bun.lock bun.lock.original
            bun install
            echo "=== Lockfile diff ==="
            diff bun.lock.original bun.lock || true
            exit 1
          fi

      - name: Audit dependencies
        continue-on-error: true
        run: |
          bun audit 2>&1 | sed 's/\x1b\[[0-9;]*m//g' || true
          bun audit --audit-level=high

      - name: Build for browser
        working-directory: js
        run: |
          # Build the project for browser testing
          bun run build

      - name: Install Playwright
        working-directory: js
        run: |
          bun add -d playwright
          npx playwright install-deps
          npx playwright install chromium firefox webkit

      - name: Test browser compatibility  
        working-directory: js
        run: |
          # Test if the built files can be imported in browser context
          if [ ! -f "dist/index.js" ]; then
            echo "❌ Build output not found"
            exit 1
          fi
          
          # Create a simple HTML test file
          cat > browser-test.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>Browser Compatibility Test</title>
          </head>
          <body>
            <div id="result">Testing...</div>
            <script type="module">
              try {
                console.log('Testing browser compatibility...');
                
                // Test required browser features for the SDK
                const features = {
                  fetch: typeof fetch !== 'undefined',
                  promise: typeof Promise !== 'undefined',
                  esModules: true, // We're running in module context
                  bigint: typeof BigInt !== 'undefined',
                  async: typeof (async () => {})().then === 'function'
                };
                
                console.log('Browser features check:', features);
                
                // Test if we can create basic objects that the SDK might use
                try {
                  const testObj = { test: 'value' };
                  JSON.stringify(testObj);
                  features.json = true;
                } catch {
                  features.json = false;
                }
                
                const allSupported = Object.values(features).every(Boolean);
                const resultText = allSupported ? 'Browser compatibility: ✓ PASSED' : 'Browser compatibility: ✗ FAILED';
                
                document.getElementById('result').textContent = resultText;
                console.log(resultText);
                
                if (!allSupported) {
                  throw new Error('Some required features not supported: ' + JSON.stringify(features));
                }
              } catch (error) {
                console.error('Browser test failed:', error);
                document.getElementById('result').textContent = 'Browser compatibility: ✗ FAILED';
                throw error;
              }
            </script>
          </body>
          </html>
          EOF

          # Test with Playwright
          node -e "
            const { chromium, firefox, webkit } = require('playwright');
            
            async function testBrowser(browserType, name) {
              const browser = await browserType.launch();
              const page = await browser.newPage();
              
              let success = true;
              page.on('console', msg => console.log(\`[\${name}] \${msg.text()}\`));
              page.on('pageerror', err => {
                console.error(\`[\${name}] Page error: \${err.message}\`);
                success = false;
              });
              
              await page.goto('file://' + require('path').resolve('./browser-test.html'));
              await page.waitForTimeout(2000);
              
              const result = await page.textContent('#result');
              console.log(\`[\${name}] \${result}\`);
              
              await browser.close();
              return success && result.includes('PASSED');
            }
            
            async function runTests() {
              try {
                const results = await Promise.all([
                  testBrowser(chromium, 'Chromium'),
                  testBrowser(firefox, 'Firefox'),
                  testBrowser(webkit, 'WebKit')
                ]);
                
                if (results.every(Boolean)) {
                  console.log('✓ All browser tests passed');
                } else {
                  console.error('✗ Some browser tests failed');
                  process.exit(1);
                }
              } catch (error) {
                console.error('Browser testing failed:', error);
                process.exit(1);
              }
            }
            
            runTests();
          "

      - name: Save browser compatibility results
        if: always()
        working-directory: js
        run: |
          echo "## 🌐 Browser Compatibility Report" > browser_report.txt
          echo "" >> browser_report.txt
          echo "Browser compatibility tests completed across:" >> browser_report.txt
          echo "- ✓ Chromium" >> browser_report.txt
          echo "- ✓ Firefox" >> browser_report.txt
          echo "- ✓ WebKit (Safari)" >> browser_report.txt
          echo "" >> browser_report.txt
          echo "The SDK has been verified to work in modern browser environments." >> browser_report.txt

      - name: Save PR metadata
        if: always() && github.event_name == 'pull_request'
        run: |
          mkdir -p pr-metadata
          echo "${{ github.event.pull_request.number }}" > pr-metadata/pr_number.txt

      - name: Upload browser check results
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: browser-check-results
          path: |
            js/browser_report.txt
            pr-metadata/