name: CLI Package Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: oven-sh/setup-bun@v2
      - name: Install workspace dependencies
        run: bun install
      - name: Build @phala/cloud package
        working-directory: js
        run: bun run build
      - name: Build CLI
        working-directory: cli
        run: bun run build
      - name: Test CLI
        working-directory: cli
        run: bun test

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - uses: oven-sh/setup-bun@v2
      - name: Install workspace dependencies
        run: bun install
      - name: Build @phala/cloud package
        working-directory: js
        run: bun run build
      - name: Build CLI
        working-directory: cli
        run: bun run build
      - name: Publish to npm
        working-directory: cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}
